# Pre-commit hooks for the Agentic Operations Platform.
#
# One-time setup (per workstation):
#     uv tool install pre-commit
#     uv run pre-commit install --install-hooks
#
# Run all hooks against the whole repository:
#     uv run pre-commit run --all-files
#
# Bump every hook to its latest stable version:
#     uv run pre-commit autoupdate
#
# CI should run:
#     uv run pre-commit run --all-files --show-diff-on-failure --color always

minimum_pre_commit_version: "4.0.0"

default_language_version:
  python: python3.13

default_install_hook_types:
  - pre-commit
  - commit-msg

fail_fast: false

repos:
  # ────────────────────────────────────────────────────────────────────────────
  # Generic file hygiene
  # ────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: forbid-submodules

  # ────────────────────────────────────────────────────────────────────────────
  # Secret detection — defence in depth at the commit boundary.
  # Configure rules in .gitleaks.toml (allowlist false positives explicitly).
  # ────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ────────────────────────────────────────────────────────────────────────────
  # Python — Ruff replaces black + isort + flake8 + pyupgrade in one binary.
  # Config lives in the top-level pyproject.toml under [tool.ruff].
  # ────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ────────────────────────────────────────────────────────────────────────────
  # uv — keep each project's uv.lock in lockstep with its pyproject.toml.
  # ────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.18
    hooks:
      - id: uv-lock
      - id: uv-export
        args: [--no-hashes, --output-file=requirements.txt]
        # Optional: only run if you also want a pip-compatible requirements.txt
        # alongside uv.lock. Comment out otherwise.
        stages: [manual]

  # ────────────────────────────────────────────────────────────────────────────
  # Terraform — fmt is fast; validate needs provider plugins (network).
  # tflint catches policy and best-practice issues fmt/validate don't.
  # ────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.106.0
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true
      - id: terraform_tflint
        args: [--args=--minimum-failure-severity=warning]
      - id: terraform_trivy
        args: [--args=--severity=HIGH,CRITICAL]

  # ────────────────────────────────────────────────────────────────────────────
  # Shell scripts
  # ────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.11.0
    hooks:
      - id: shellcheck

  # ────────────────────────────────────────────────────────────────────────────
  # Dockerfiles
  # ────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.14.0
    hooks:
      - id: hadolint-docker
        # DL3008: pin apt versions (warning is noisy for slim images).
        # DL3013: pin pip versions (we use uv; pip not used).
        args: [--ignore, DL3008, --ignore, DL3013]

  # ────────────────────────────────────────────────────────────────────────────
  # Markdown
  # ────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.48.0
    hooks:
      - id: markdownlint
        args:
          - --disable=MD013  # line length — design review has long lines
          - --disable=MD033  # inline HTML — used for ASCII diagrams
          - --disable=MD034  # bare URLs — explicit in some references
          - --disable=MD041  # first line H1 — issue templates use frontmatter

  # ────────────────────────────────────────────────────────────────────────────
  # Conventional Commits — enforce commit-message format
  # Format: <type>(<scope>): <subject>
  # Types:  feat | fix | docs | style | refactor | perf | test | build | ci | chore | revert
  # ────────────────────────────────────────────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, --force-scope]

# ─── pre-commit.ci settings (https://pre-commit.ci) ──────────────────────────
ci:
  autofix_commit_msg: |
    style(pre-commit): apply automatic fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_commit_msg: |
    chore(pre-commit): autoupdate hook versions
  autoupdate_schedule: weekly
  skip:
    # Skip in pre-commit.ci because provider plugins / docker daemon aren't available there.
    - terraform_validate
    - terraform_tflint
    - terraform_trivy
    - hadolint-docker
    - gitleaks   # Run as a dedicated GitHub Actions workflow instead, with the full secret list.
  submodules: false
