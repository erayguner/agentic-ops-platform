# Action-class policy — placeholder
# Action-class × autonomy-tier matrix (see DESIGN-REVIEW §3.3 for tier semantics).
#
# tier: 0=observe  1=recommend  2=act-guarded  3=act-slack-approved  4=act-autonomous
# bounds: validated by policy.py._check_bounds()
#
# This file is version-controlled; tier promotions require ≥2 reviewers
# and a green policy-unit-test run (DESIGN-REVIEW §5.5).

action_classes:
  - name: cloud_run.scale_within_range
    environments:
      - env: dev
        tier: 2
        allowed: true
        required_approvers: 0
        bounds:
          min_instances: 0
          max_instances: 20
      - env: prod
        tier: 2
        allowed: true
        required_approvers: 0
        bounds:
          min_instances: 1
          max_instances: 10

  - name: cloud_run.restart_revision
    environments:
