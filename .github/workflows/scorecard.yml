# OpenSSF Scorecard — measures the repo against ~20 supply-chain security
# best-practice checks (branch protection, signed releases, pinned actions,
# token permissions, SAST coverage, fuzzing, etc.). Results are uploaded to
# the GitHub Security tab and (because publish_results: true) published
# publicly so the score badge in README.md resolves.
#
# Docs: https://github.com/ossf/scorecard-action

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC — aligns with the other weekly security runs.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Upload SARIF to GitHub Security
      id-token: write # Publish results to the OpenSSF API
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishing makes the public score available at
          # https://api.securityscorecards.dev/projects/github.com/<org>/<repo>
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
