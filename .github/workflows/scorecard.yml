# OpenSSF Scorecard — measures the repo against ~20 supply-chain security
# best-practice checks (branch protection, signed releases, pinned actions,
# token permissions, SAST coverage, fuzzing, etc.). Results are uploaded to
# the GitHub Security tab and (because publish_results: true) published
# publicly so the score badge in README.md resolves.
#
# Docs: https://github.com/ossf/scorecard-action

name: OpenSSF Scorecard

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC — aligns with the other weekly security runs.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # Upload SARIF to GitHub Security
      id-token: write          # Publish results to the OpenSSF API
      contents: read
      actions: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishing makes the public score available at
          # https://api.securityscorecards.dev/projects/github.com/<org>/<repo>
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
