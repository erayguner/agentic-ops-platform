# Secret scanning — defence in depth at the CI boundary.
#
# The gitleaks pre-commit hook in .pre-commit-config.yaml catches secrets on
# the contributor's workstation; pre-commit.ci skips gitleaks (see the `ci.skip`
# block in that file) so this dedicated workflow is the authoritative gate for
# PRs, the default branch, and the weekly historical re-scan.
#
# Gitleaks version is pinned to match .pre-commit-config.yaml so local and CI
# verdicts cannot diverge.

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan the full history weekly to catch newly-published rule updates
    # against already-merged history (Mondays 06:00 UTC).
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so gitleaks scans every commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin to the same version as .pre-commit-config.yaml.
          GITLEAKS_VERSION: 8.30.1
          # GITLEAKS_LICENSE is only required for private organisations.
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
