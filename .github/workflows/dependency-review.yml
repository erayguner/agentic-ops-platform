# Dependency Review — blocks PRs that introduce dependencies with known
# vulnerabilities (≥ high severity) or with licences that conflict with the
# repo's MIT licence. Runs only on PRs; uses the dependency graph from the
# base ref vs. the PR head ref.
#
# Docs: https://docs.github.com/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review

name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Review PR dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Block copyleft licences that are incompatible with the repo's
          # MIT licence. Tighten this list before adding any non-permissive
          # runtime dependency.
          deny-licenses: >-
            GPL-2.0,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0,
            GPL-3.0-only,
            GPL-3.0-or-later,
            AGPL-1.0,
            AGPL-1.0-only,
            AGPL-1.0-or-later,
            AGPL-3.0,
            AGPL-3.0-only,
            AGPL-3.0-or-later
