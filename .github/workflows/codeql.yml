# CodeQL — static security analysis. Two surfaces:
#   1. Python — all four uv components (root, agents/, services/*).
#   2. Actions — the workflows in this directory (catches workflow-injection
#      vulnerabilities, missing permissions: blocks, etc.).
#
# Findings land in the GitHub Security tab as Code Scanning alerts.
#
# Docs: https://docs.github.com/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities-and-errors/configuring-code-scanning

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC — same window as the other security workflows.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # Job-level concurrency: matrix.* is only in scope inside the job, so each
    # matrix leg gets its own group (codeql-<ref>-python, codeql-<ref>-actions).
    concurrency:
      group: codeql-${{ github.ref }}-${{ matrix.language }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialise CodeQL
        uses: github/codeql-action/init@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Analyse
        uses: github/codeql-action/analyze@f52b05f4acaaa234e44466e66d29050e135ea9ef # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
